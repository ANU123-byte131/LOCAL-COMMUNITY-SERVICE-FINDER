<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Local Community Service Finder</title>
  </head>
  <body class="fs-unmask-airo-app-builder">
    <div id="app" class="fs-unmask-airo-app-builder"></div>
    <script type="module">
      if (import.meta.env.MODE === 'development') {
        await import('/dev-tools/src/error-client.ts')
      }
      import('/src/main.tsx').catch(err => {
        // If the module fails to load (e.g. after a server restart), force a hard reload
        if (err?.message?.includes('Failed to fetch dynamically imported module') || err?.message?.includes('fetch')) {
          window.location.reload();
        } else {
          window.dispatchEvent(new CustomEvent('vite:initial-error', { detail: err }));
        }
      })
    </script>
    <script src="/analytics.js"></script>
  </body>
</html>
